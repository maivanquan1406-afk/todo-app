{% extends 'base.html' %}
{% block title %}Quên mật khẩu{% endblock %}
{% block header %}Quên mật khẩu{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <p class="text-muted">Nhập email của bạn, chúng tôi sẽ gửi mã OTP đặt lại mật khẩu nếu email tồn tại.</p>

    <form id="forgot-form" method="post" action="/api/v1/auth/forgot-password" class="auth-form">
      <div class="mb-3">
        <label for="forgotEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="forgotEmail" name="email" required placeholder="Hãy nhập gmail của bạn">
      </div>
      <button type="submit" class="btn btn-primary w-100" id="forgotSubmit">Gửi OTP</button>
    </form>

    <div id="message" class="mt-3"></div>

    <div class="mt-3 text-center">
      <a href="/api/v1/auth/login-page" class="text-decoration-none">Quay lại trang đăng nhập</a>
    </div>
  </div>
</div>

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('forgot-form');
    if (!form) {
      return;
    }
    const submitBtn = document.getElementById('forgotSubmit');
    let isSubmitting = false;

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      if (isSubmitting) {
        return;
      }
      isSubmitting = true;
      const formData = new FormData(form);
      const messageBox = document.getElementById('message');
      messageBox.innerHTML = '';
      const originalButtonContent = submitBtn ? submitBtn.innerHTML : '';
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Đang gửi...';
      }

      try {
        const response = await fetch('/api/v1/auth/forgot-password', {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: new URLSearchParams(formData)
        });
        const responseText = await response.text();
        let data = {};
        if (responseText) {
          try {
            data = JSON.parse(responseText);
          } catch (_) {
            data = { raw: responseText };
          }
        }
        if (!response.ok) {
          const detail = data.detail;
          const message = (detail && typeof detail === 'object' && detail.message)
            || (typeof detail === 'string' && detail)
            || data.message
            || data.raw
            || 'Unexpected error';
          throw new Error(message);
        }

        messageBox.innerHTML = '<div class="alert alert-success">OTP đã được gửi nếu email tồn tại.</div>';
        const emailValue = formData.get('email');
        form.reset();
        if (emailValue) {
          setTimeout(() => {
            window.location.href = `/api/v1/auth/verify-otp-page?email=${encodeURIComponent(emailValue)}`;
          }, 1500);
        }
      } catch (err) {
        const errorMessage = err.message || 'Có lỗi xảy ra, vui lòng thử lại.';
        messageBox.innerHTML = `<div class="alert alert-danger">${errorMessage}</div>`;
      } finally {
        isSubmitting = false;
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalButtonContent || 'Gửi OTP';
        }
      }
    });
  });
</script>
{% endblock %}
{% endblock %}
